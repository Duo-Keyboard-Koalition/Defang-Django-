services:
  django:
    restart: unless-stopped
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORTEX_HOST=${CORTEX_HOST:-192.168.16.113}
      - CORTEX_PORT=${CORTEX_PORT:-5000}
      - DATABASE_URL=postgres://dkk:dkk@db:5432/dkk
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dkk
      POSTGRES_PASSWORD: dkk
      POSTGRES_DB: dkk
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
